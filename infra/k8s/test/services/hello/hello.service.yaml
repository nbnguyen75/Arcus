apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: arcus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
        - name: hello
          image: hashicorp/http-echo:latest
          args:
            - "-text=Hello from Arcus"
          ports:
            - containerPort: 5678
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: hello-svc
  namespace: arcus
spec:
  selector:
    app: hello
  ports:
    - port: 80
      targetPort: 5678